<div class="chat-container">
  <ng-container *ngIf="agentsPanelOpen">
    <div class="agents-panel">
      <div class="agents-title">AVAILABLE AI AGENTS</div>
      <div class="agents-list">
        <ng-container *ngIf="!loading && agents.length > 0; else loadingOrEmpty">
          <div class="agent-row" *ngFor="let agent of agents; let i = index">
            <span class="agent-num" [ngClass]="{red: i === agents.length - 1}">{{ i + 1 }}</span>
            <div class="agent-info">
              <div class="agent-name">{{ agent.name }}</div>
              <div class="agent-desc">{{ agent.description }}</div>
            </div>
            <span *ngIf="i === agents.length - 1" class="agent-check">✔️</span>
          </div>
        </ng-container>
        <ng-template #loadingOrEmpty>
          <div *ngIf="loading" class="agent-row">Loading agents...</div>
          <div *ngIf="!loading && error" class="agent-row">{{ error }}</div>
          <div *ngIf="!loading && !error && agents.length === 0" class="agent-row">No agents found.</div>
        </ng-template>
      </div>
    </div>
  </ng-container>
  <div class="chat-card">
    <!-- TOP OPTIONS -->
    <div class="chat-top">
      <span (click)="toggleAgentsPanel()" style="cursor:pointer;user-select:none;">Agents {{ agentsPanelOpen ? '▲' : '▼' }}</span>
      <span>FAQ ▼</span>
    </div>
    <!-- INPUT ROW -->
    <div class="chat-input-row">
      <span class="plus">+</span>
      <input type="text" placeholder="Ask Sanmina AI..." />
      <button class="send">↑</button>
    </div>
  </div>
  <p class="chat-note">
    Sanmina AI can make mistakes. Check important info.
  </p>
</div>
